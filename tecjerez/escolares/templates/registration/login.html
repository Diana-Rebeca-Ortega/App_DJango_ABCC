<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso al Sistema - Servicios Escolares</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .login-container {
            margin-top: 100px;
            max-width: 400px;
        }
        .card {
            border: none;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .btn-primary {
            background-color: #198754; /* Verde similar al de tu botón AGREGAR */
            border: none;
        }
        .btn-primary:hover {
            background-color: #157347;
        }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center">
    <div class="login-container w-100">
        <div class="text-center mb-4">
            <h2 class="fw-bold">SERVICIOS ESCOLARES</h2>
            <p class="text-muted">Por favor, inicia sesión para continuar</p>
        </div>
        
        <div class="card p-4">
          
                {% csrf_token %}
                
                <div class="mb-3">
                    <label for="id_username" class="form-label">Usuario</label>
                    <input type="text" name="username" autofocus maxlength="150" required id="id_username" class="form-control">
                </div>
                
                <div class="mb-4">
                    <label for="id_password" class="form-label">Contraseña</label>
                    <input type="password" name="password" required id="id_password" class="form-control">
                </div>

                {% if form.errors %}
                <div class="alert alert-danger p-2" style="font-size: 0.9rem;">
                    Usuario o contraseña incorrectos.
                </div>
                {% endif %}

             <div class="d-grid">
    <a href="/alumnos/" class="btn btn-primary">ENTRAR</a>
</div>
            
        </div>
        
        <p class="text-center mt-4 text-muted" style="font-size: 0.8rem;">
            TecNM - Instituto Tecnológico Superior de Jerez
        </p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
